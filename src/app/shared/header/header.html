<mat-toolbar class="main-header">
    <button matButton routerLink="/home">
        Pizza Express
    </button>


    <mat-form-field appearance="outline" class="search-field">
        <mat-label>Pesquisar produtos</mat-label>
        <input matInput class="input-filter" placeholder="Pesquise o nome do produto" 
         /* [(ngModel)]="searchTerm"*/
         />
        <mat-icon matSuffix>search</mat-icon>
    </mat-form-field> 
    
    
    <button matButton routerLink="/carrinho">
        <mat-icon aria-hidden="false" aria-label="icon-store" fontIcon="shopping_cart"></mat-icon>
    </button>
    <button matButton routerLink="/login">
        <mat-icon aria-hidden="false" aria-label="icon-store" fontIcon="account_circle"></mat-icon> 
    </button>
</mat-toolbar>
